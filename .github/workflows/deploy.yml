name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: "pages"
  cancel-in-progress: true

# IMPORTANT: this workflow uses the GitHub Actions deployment API
# (upload-pages-artifact + deploy-pages). The GitHub Pages source in
# Settings -> Pages is set to "GitHub Actions". Do NOT switch the deploy
# step to peaceiris/actions-gh-pages -- that pushes to the gh-pages branch,
# which GitHub Pages silently ignores in this mode, and the live site
# will freeze at whatever the last Actions deployment was.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.131.0'
          extended: true

      - name: Build
        run: hugo --minify --buildFuture --baseURL "https://kaveenranasingha2004-sentinel.github.io/scribo_site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
